services:
  web:
    build: .
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
    read_only: true
    tmpfs:
      - /tmp
      - /config/caddy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
